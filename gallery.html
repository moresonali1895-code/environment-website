<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   

    <title>Family Restaurant Gallery</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #fff8dc;
            margin: 0;
            text-align: center;
        }

        h1{
            background-color: darkred;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .gallery{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .gallery img{
            width: 300px;
            height: 200px;
            margin: 15px;
            border: 5px solid gold;
            border-radius: 15px;
            box-shadow: 0 0 10px gray;
            transition: 0.4s;
        }

        .gallery img:hover{
            transform: scale(1.1);
            box-shadow: 0 0 20px darkred;
        }

        p{
            color: darkred;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>📸 Family Restaurant Gallery 📸</h1>

    <p>Explore Our Delicious Food & Beautiful Ambience</p>

    <div class="gallery">
        <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/12/96/d1/55/giardino.jpg" alt="Restaurant">
        <img src="https://static.toiimg.com/thumb/56933159.cms?imgsize=686279&width=800&height=800" alt="Pizza">
        <img src="https://lh3.googleusercontent.com/WH2ptFvmEugNe0j0iGgw2NynrlLXqED3sPjKujcv1IIw9Iv5Niq6c-pNGQIGqiv0lpp73UDhDgEAzhSRbIPV9esbHBZfPkasEmWl7zgZig=w1600-rw" alt="Burger">
        <img src="https://www.cookwithkushi.com/wp-content/uploads/2015/11/spicy_Indian_chicken_biryani_recipe.jpg" alt="Biryani">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Desserts.jpg" alt="Dessert">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSrVZVIe0nL1BCk5Pr1NVKixVeadC0zgSotw&s" alt="Family Dining">
    </div>

</body> 
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="Menu">
        <h2>Menu</h2>
        <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #fff8dc;
            text-align: center;
        }

        h1{
            color: darkred;
            background-color: gold;
            padding: 15px;
            border-radius: 10px;
        }

        table{
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 0px 10px gray;
        }

        th{
            background-color: darkred;
            color: white;
            padding: 12px;
        }

        td{
            padding: 10px;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }

        tr:hover{
            background-color: #ffe4b5;
        }

        .starters{
            background-color: #ffcc80;
            font-weight: bold;
        }

        .maincourse{
            background-color: #90ee90;
            font-weight: bold;
        }

        .desserts{
            background-color: #ffb6c1;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🍴 Family Restaurant Menu 🍴</h1>

    <table border="1">
        <tr>
            <th>Category</th>
            <th>Item</th>
            <th>Price</th>
        </tr>

        <tr>
            <td rowspan="3" class="starters">🍽 Starters</td>
            <td>Soup</td>
            <td>₹80</td>
        </tr>
        <tr>
            <td>French Fries</td>
            <td>₹120</td>
        </tr>
        <tr>
            <td>Spring Roll</td>
            <td>₹150</td>
        </tr>

        <tr>
            <td rowspan="3" class="maincourse">🍛 Main Course</td>
            <td>Paneer Butter Masala</td>
            <td>₹250</td>
        </tr>
        <tr>
            <td>Veg Biryani</td>
            <td>₹220</td>
        </tr>
        <tr>
            <td>Dal Tadka</td>
            <td>₹180</td>
        </tr>

        <tr>
            <td rowspan="3" class="desserts">🍨 Desserts</td>
            <td>Ice Cream</td>
            <td>₹90</td>
        </tr>
        <tr>
            <td>Gulab Jamun</td>
            <td>₹80</td>
        </tr>
        <tr>
            <td>Rasmalai</td>
            <td>₹100</td>
        </tr>

    </table>
</section>
</body>
</html>
